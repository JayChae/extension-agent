<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <title>AI 신입사원</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 0;
        display: flex;
        flex-direction: column;
        height: 100vh;
      }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 10px;
        border-bottom: 1px solid #ddd;
      }
      header h1 {
        font-size: 14px;
        margin: 0;
      }
      #status {
        font-size: 11px;
        color: #888;
      }
      header .btns {
        display: flex;
        gap: 6px;
      }
      #stop {
        background: #c0392b;
        color: #fff;
        border: none;
        border-radius: 4px;
        padding: 4px 10px;
        cursor: pointer;
      }
      #stop:disabled {
        opacity: 0.5;
        cursor: default;
      }
      #teach {
        background: #e67e22;
        color: #fff;
        border: none;
        border-radius: 4px;
        padding: 4px 10px;
        cursor: pointer;
      }
      #teach.recording {
        background: #b9770e;
      }
      #log {
        flex: 1;
        overflow-y: auto;
        padding: 8px 10px;
        font-size: 13px;
      }
      .line {
        margin: 2px 0;
        white-space: pre-wrap;
        word-break: break-all;
      }
      .user {
        color: #1565c0;
      }
      .backend {
        color: #2e7d32;
      }
      .content {
        color: #6a1b9a;
      }
      .sys {
        color: #999;
        font-style: italic;
      }
      .card {
        margin: 6px 0;
        padding: 10px;
        border: 1px solid #f0a000;
        background: #fff8e1;
        border-radius: 6px;
      }
      .card .head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 6px;
        margin-bottom: 8px;
      }
      .card .q {
        font-weight: 600;
        white-space: pre-wrap;
      }
      .card .close {
        border: none;
        background: transparent;
        color: #888;
        cursor: pointer;
        font-size: 14px;
        line-height: 1;
        padding: 0 2px;
        flex-shrink: 0;
      }
      .card .opts {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-bottom: 8px;
      }
      .card .opts button {
        border: 1px solid #f0a000;
        background: #fff;
        border-radius: 4px;
        padding: 4px 10px;
        cursor: pointer;
      }
      .card .answer {
        display: flex;
        gap: 6px;
      }
      .card .answer input {
        flex: 1;
        padding: 6px;
      }
      form {
        display: flex;
        gap: 6px;
        padding: 8px 10px;
        border-top: 1px solid #ddd;
      }
      #text {
        flex: 1;
        padding: 6px;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>AI 신입사원</h1>
      <span id="status">연결 중…</span>
      <div class="btns">
        <button id="teach" type="button">가르치기</button>
        <button id="stop" type="button">STOP</button>
      </div>
    </header>
    <div id="log"></div>
    <form id="form">
      <input id="text" type="text" placeholder="메시지를 입력하세요" autocomplete="off" />
      <button type="submit">보내기</button>
    </form>
    <script src="sidepanel.js"></script>
  </body>
</html>
